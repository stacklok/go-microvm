version: '3'

vars:
  RUNNER_NAME: propolis-runner
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
  LDFLAGS: >-
    -X github.com/stacklok/propolis/internal/version.Version={{.VERSION}}
    -X github.com/stacklok/propolis/internal/version.Commit={{.COMMIT}}
    -X github.com/stacklok/propolis/internal/version.BuildDate={{.BUILD_DATE}}
  HOST_ARCH:
    sh: uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/'
  CONTAINER_RUNTIME:
    sh: command -v podman >/dev/null 2>&1 && echo podman || echo docker
  BUILDER_IMAGE: ghcr.io/stacklok/propolis-builder
  LIBKRUN_VERSION:
    sh: grep '^LIBKRUN_VERSION=' versions.env | cut -d= -f2
  LIBKRUN_MAJOR:
    sh: grep '^LIBKRUN_VERSION=' versions.env | cut -d= -f2 | sed 's/^v//' | cut -d. -f1
  BUILDER_IMAGE_TAG: '{{.LIBKRUN_VERSION}}'

# Quick reference:
#   task build-dev        → Fast dev build (requires system libkrun-devel)
#   task build-runner     → Build runner + libs using builder container
#   task fetch-runtime    → Download pre-built runtime from GitHub Release
#   task fetch-firmware   → Download pre-built firmware from GitHub Release
#   task test             → Run tests with race detector
#   task test-nocgo       → Run tests excluding CGO packages
#   task lint             → Run linter
#   task verify           → fmt + lint + test

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # =============================================================================
  # Development Build (requires system libkrun-devel)
  # =============================================================================

  build-dev:
    desc: Build runner for development (requires libkrun-devel on system)
    platforms: [linux]
    env:
      CGO_ENABLED: "1"
    cmds:
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/{{.RUNNER_NAME}} ./runner/cmd/propolis-runner
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - bin/{{.RUNNER_NAME}}

  build-dev-darwin:
    desc: Build runner for development on macOS (requires Homebrew libkrun)
    platforms: [darwin]
    cmds:
      - mkdir -p bin
      - CGO_ENABLED=1 go build -ldflags "{{.LDFLAGS}}" -o bin/{{.RUNNER_NAME}} ./runner/cmd/propolis-runner
      # Hypervisor.framework requires entitlements
      - codesign --entitlements assets/entitlements.plist --force -s - bin/{{.RUNNER_NAME}}

  build-runner-darwin:
    desc: Build runner + copy Homebrew dylibs for macOS packaging
    platforms: [darwin]
    cmds:
      - task: build-dev-darwin
      - cp -f $(brew --prefix libkrun)/lib/libkrun.dylib bin/
      - cp -f $(brew --prefix libkrunfw)/lib/libkrunfw.dylib bin/
      # Rewrite absolute Homebrew install name to @loader_path for portable bundles
      - >-
        install_name_tool -change
        /opt/homebrew/opt/libkrun/lib/libkrun.{{.LIBKRUN_MAJOR}}.dylib
        @loader_path/libkrun.dylib
        bin/{{.RUNNER_NAME}}
      # Re-sign after binary modification (install_name_tool invalidates signature)
      - codesign --entitlements assets/entitlements.plist --force -s - bin/{{.RUNNER_NAME}}
    generates:
      - bin/{{.RUNNER_NAME}}
      - bin/libkrun.dylib
      - bin/libkrunfw.dylib

  build-dev-race:
    desc: Build runner with race detector (requires libkrun-devel)
    env:
      CGO_ENABLED: "1"
    cmds:
      - mkdir -p bin
      - go build -race -ldflags "{{.LDFLAGS}}" -o bin/{{.RUNNER_NAME}} ./runner/cmd/propolis-runner

  # =============================================================================
  # Standard Tasks
  # =============================================================================

  test:
    desc: Run unit tests
    cmds:
      - go test -v -race ./...

  test-nocgo:
    desc: Run unit tests excluding CGO packages
    cmds:
      - go test -v -race $(go list ./... | grep -v krun | grep -v propolis-runner)

  test-coverage:
    desc: Run tests with coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run --allow-parallel-runners ./...

  lint-fix:
    desc: Run linter and fix issues
    cmds:
      - golangci-lint run --allow-parallel-runners --fix ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...
      - goimports -w .

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  build-nocgo:
    desc: Verify compilation of pure Go packages (no CGO)
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build $(go list ./... | grep -v krun | grep -v propolis-runner)

  verify:
    desc: Verify code (fmt, lint, test)
    cmds:
      - task: fmt
      - task: lint
      - task: test

  version:
    desc: Print version information
    cmds:
      - 'echo "Version: {{.VERSION}}"'
      - 'echo "Commit: {{.COMMIT}}"'
      - 'echo "Build Date: {{.BUILD_DATE}}"'

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/ dist/
      - rm -f coverage.out coverage.html

  # =============================================================================
  # Builder Image
  # =============================================================================

  builder-image-build:
    desc: Build builder image for current platform
    platforms: [linux]
    cmds:
      - >-
        {{.CONTAINER_RUNTIME}} build
        --build-arg LIBKRUN_VERSION={{.LIBKRUN_VERSION}}
        --build-arg LIBKRUNFW_VERSION=$(grep '^LIBKRUNFW_VERSION=' versions.env | cut -d= -f2)
        -t {{.BUILDER_IMAGE}}:{{.BUILDER_IMAGE_TAG}}
        -f images/builder/Containerfile
        images/builder

  builder-image-push:
    desc: Push builder image to ghcr.io
    platforms: [linux]
    cmds:
      - '{{.CONTAINER_RUNTIME}} push {{.BUILDER_IMAGE}}:{{.BUILDER_IMAGE_TAG}}'

  # =============================================================================
  # Container-based Build (no system libkrun needed)
  # =============================================================================

  build-runner:
    desc: Build runner + extract libs using builder container
    platforms: [linux]
    cmds:
      - mkdir -p bin
      - |
        id=$({{.CONTAINER_RUNTIME}} create {{.BUILDER_IMAGE}}:{{.BUILDER_IMAGE_TAG}})
        {{.CONTAINER_RUNTIME}} cp ${id}:/opt/libkrun-built/libkrun.so.1 bin/
        {{.CONTAINER_RUNTIME}} cp ${id}:/opt/libkrun-built/libkrunfw.so.5 bin/
        {{.CONTAINER_RUNTIME}} rm ${id}
      - >-
        {{.CONTAINER_RUNTIME}} run --rm -v $(pwd):/src:z -w /src
        -e CGO_ENABLED=1
        {{.BUILDER_IMAGE}}:{{.BUILDER_IMAGE_TAG}}
        go build -buildvcs=false -ldflags "{{.LDFLAGS}}" -o bin/{{.RUNNER_NAME}} ./runner/cmd/propolis-runner
    generates:
      - bin/{{.RUNNER_NAME}}
      - bin/libkrun.so.1
      - bin/libkrunfw.so.5

  # =============================================================================
  # Release Packaging
  # =============================================================================

  package-runtime:
    desc: Package runtime tarball (runner + libkrun)
    vars:
      TAG: '{{.TAG | default .VERSION}}'
    cmds:
      - mkdir -p dist
      - |
        staging="propolis-runtime-linux-{{.HOST_ARCH}}"
        mkdir -p "${staging}"
        cp bin/propolis-runner bin/libkrun.so.1 "${staging}/"
        echo "{{.TAG}}" > "${staging}/VERSION"
        tar czf "dist/${staging}.tar.gz" "${staging}"
        rm -rf "${staging}"

  package-firmware:
    desc: Package firmware tarball (libkrunfw, GPL-licensed)
    vars:
      TAG: '{{.TAG | default .VERSION}}'
    cmds:
      - mkdir -p dist
      - |
        staging="propolis-firmware-linux-{{.HOST_ARCH}}"
        mkdir -p "${staging}"
        cp bin/libkrunfw.so.5 "${staging}/"
        echo "{{.TAG}}" > "${staging}/VERSION"
        cat > "${staging}/LICENSE-GPL" <<'LICEOF'
        libkrunfw is licensed under the GNU General Public License v2.0 (GPL-2.0).
        See https://github.com/containers/libkrunfw for full license text.
        LICEOF
        tar czf "dist/${staging}.tar.gz" "${staging}"
        rm -rf "${staging}"

  package-runtime-darwin:
    desc: Package macOS runtime tarball (runner + libkrun)
    platforms: [darwin]
    vars:
      TAG: '{{.TAG | default .VERSION}}'
    cmds:
      - mkdir -p dist
      - |
        staging="propolis-runtime-darwin-{{.HOST_ARCH}}"
        mkdir -p "${staging}"
        cp bin/propolis-runner bin/libkrun.dylib "${staging}/"
        echo "{{.TAG}}" > "${staging}/VERSION"
        tar czf "dist/${staging}.tar.gz" "${staging}"
        rm -rf "${staging}"

  package-firmware-darwin:
    desc: Package macOS firmware tarball (libkrunfw, GPL-licensed)
    platforms: [darwin]
    vars:
      TAG: '{{.TAG | default .VERSION}}'
    cmds:
      - mkdir -p dist
      - |
        staging="propolis-firmware-darwin-{{.HOST_ARCH}}"
        mkdir -p "${staging}"
        cp bin/libkrunfw.dylib "${staging}/"
        echo "{{.TAG}}" > "${staging}/VERSION"
        cat > "${staging}/LICENSE-GPL" <<'LICEOF'
        libkrunfw is licensed under the GNU General Public License v2.0 (GPL-2.0).
        See https://github.com/containers/libkrunfw for full license text.
        LICEOF
        tar czf "dist/${staging}.tar.gz" "${staging}"
        rm -rf "${staging}"

  # =============================================================================
  # Fetch Pre-built Artifacts
  # =============================================================================

  fetch-runtime:
    desc: Download pre-built runtime tarball from GitHub Release
    vars:
      RELEASE_TAG: '{{.RELEASE_TAG | default .VERSION}}'
    cmds:
      - mkdir -p bin
      - >-
        gh release download {{.RELEASE_TAG}}
        --repo stacklok/propolis
        --pattern "propolis-runtime-linux-{{.HOST_ARCH}}.tar.gz"
        --dir bin/ --clobber
      - tar -xzf bin/propolis-runtime-linux-{{.HOST_ARCH}}.tar.gz -C bin/ --strip-components=1
      - rm -f bin/propolis-runtime-linux-{{.HOST_ARCH}}.tar.gz

  fetch-firmware:
    desc: Download pre-built firmware tarball from GitHub Release
    vars:
      RELEASE_TAG: '{{.RELEASE_TAG | default .VERSION}}'
    cmds:
      - mkdir -p bin
      - >-
        gh release download {{.RELEASE_TAG}}
        --repo stacklok/propolis
        --pattern "propolis-firmware-linux-{{.HOST_ARCH}}.tar.gz"
        --dir bin/ --clobber
      - tar -xzf bin/propolis-firmware-linux-{{.HOST_ARCH}}.tar.gz -C bin/ --strip-components=1
      - rm -f bin/propolis-firmware-linux-{{.HOST_ARCH}}.tar.gz

  fetch-runtime-darwin:
    desc: Download pre-built macOS runtime tarball from GitHub Release
    vars:
      RELEASE_TAG: '{{.RELEASE_TAG | default .VERSION}}'
    cmds:
      - mkdir -p bin
      - >-
        gh release download {{.RELEASE_TAG}}
        --repo stacklok/propolis
        --pattern "propolis-runtime-darwin-{{.HOST_ARCH}}.tar.gz"
        --dir bin/ --clobber
      - tar -xzf bin/propolis-runtime-darwin-{{.HOST_ARCH}}.tar.gz -C bin/ --strip-components=1
      - rm -f bin/propolis-runtime-darwin-{{.HOST_ARCH}}.tar.gz

  fetch-firmware-darwin:
    desc: Download pre-built macOS firmware tarball from GitHub Release
    vars:
      RELEASE_TAG: '{{.RELEASE_TAG | default .VERSION}}'
    cmds:
      - mkdir -p bin
      - >-
        gh release download {{.RELEASE_TAG}}
        --repo stacklok/propolis
        --pattern "propolis-firmware-darwin-{{.HOST_ARCH}}.tar.gz"
        --dir bin/ --clobber
      - tar -xzf bin/propolis-firmware-darwin-{{.HOST_ARCH}}.tar.gz -C bin/ --strip-components=1
      - rm -f bin/propolis-firmware-darwin-{{.HOST_ARCH}}.tar.gz

  fetch-runtime-oci:
    desc: Pull pre-built runtime OCI artifact from ghcr.io
    vars:
      RELEASE_TAG: '{{.RELEASE_TAG | default .VERSION}}'
    cmds:
      - mkdir -p bin
      - >-
        oras pull
        ghcr.io/stacklok/propolis/runtime:{{.RELEASE_TAG}}-linux-{{.HOST_ARCH}}
        -o bin/
      - tar -xzf bin/propolis-runtime-linux-{{.HOST_ARCH}}.tar.gz -C bin/ --strip-components=1
      - rm -f bin/propolis-runtime-linux-{{.HOST_ARCH}}.tar.gz

  fetch-firmware-oci:
    desc: Pull pre-built firmware OCI artifact from ghcr.io
    vars:
      RELEASE_TAG: '{{.RELEASE_TAG | default .VERSION}}'
    cmds:
      - mkdir -p bin
      - >-
        oras pull
        ghcr.io/stacklok/propolis/firmware:{{.RELEASE_TAG}}-linux-{{.HOST_ARCH}}
        -o bin/
      - tar -xzf bin/propolis-firmware-linux-{{.HOST_ARCH}}.tar.gz -C bin/ --strip-components=1
      - rm -f bin/propolis-firmware-linux-{{.HOST_ARCH}}.tar.gz
