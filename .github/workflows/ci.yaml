name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - {os: ubuntu-latest, name: Linux}
          - {os: macos-15, name: macOS}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run tests (excluding CGO packages)
        run: task test-nocgo

  lint:
    name: Lint (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - {os: ubuntu-latest, name: Linux}
          - {os: macos-15, name: macOS}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=5m
        env:
          CGO_ENABLED: "0"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Verify compilation (pure Go packages)
        run: task build-nocgo

  build-cgo-linux:
    name: Build (Linux CGO)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build runner using builder container
        run: task build-runner

  build-cgo-macos:
    name: Build (macOS CGO)
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install libkrun
        run: |
          brew tap slp/krun
          brew install libkrun libkrunfw

      - name: Build and sign runner
        run: task build-dev-darwin
